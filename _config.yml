# Site settings
title: FilipinoHub
description: Filipino-focused news, entertainment, stories, and content
url: "https://filipinohub.github.io"
baseurl: "/FilipinoHub"

# Build settings
markdown: kramdown
permalink: /:categories/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:title/

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "FilipinoHub Team"

# Categories
categories:
  - entertainment
  - music
  - sports
  - lifestyle
  - places
  - stories
  - editorial
  - government-agencies

# Subcategories
subcategories:
  entertainment:
    - showbiz
    - celebrities
    - movies-tv
    - pageantry
    - variety-shows
  music:
    - ppop
    - opm
    - concerts
    - albums
    - artists
  sports:
    - basketball
    - football
    - esports
    - local-sports
    - international-sports
  lifestyle:
    - health
    - travel
    - food
    - fashion
    - technology
  places:
    - tourist-spots
    - hidden-gems
    - travel-guides
    - provinces
    - cities
  stories:
    - inspirational
    - short-stories
    - love-stories
    - horror-stories
    - real-life-stories
  editorial:
    - opinion
    - analysis
    - commentary
    - featured-writers
  government-agencies:
    - national-agencies
    - local-government
    - public-services
    - announcements
    - programs

